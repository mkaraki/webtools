<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Player / Tone Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        div.ib {
            display: inline-block;
            width: 40px;
        }
        canvas.peak {
            display: inline-block;
            width: calc(100vw - 160px);
            height: 2.2em;
            border: 1px solid gray;
        }
        canvas.osc {
            display: inline-block;
            width: calc(100vw - 160px);
            height: 200px;
            border: 1px solid gray;
        }
        div.peak-val {
            display: inline-block;
            width: 70px;
            text-align: right;
        }
    </style>
</head>
<body>
    <header>
        <h1>Audio Player / Tone Generator</h1>
        <hr />
    </header>
    <div>
        <h2>Input</h2>
        <div>
            <label for="input-file">Audio File: </label>
            <input type="file" id="input-file" />
        </div>
        <div>
            Display Media:
            <button id="input-display">Open Display Media</button>
        </div>
        <div>
            Tone Generator:
            <span>
                <label for="tg-type">Wave: </label>
                <select id="tg-type">
                    <option value="sine">Sine</option>
                    <option value="square">Square</option>
                    <option value="sawtooth">Sawtooth</option>
                    <option value="triangle">Triangle</option>
                </select>
            </span>
            <span>
                <label for="tg-freq">Freq: </label>
                <input type="number" min="1" value="440" step="0.01" id="tg-freq" />
                Hz
            </span>
            <span>
                <label for="tg-detune">Detune: </label>
                <input type="number" value="0" step="0.01" id="tg-detune" />
                cents
            </span>
            <button id="tg-start">Start</button>
        </div>
    </div>
    <div>
        <h2>Control</h2>
        <audio id="audio-elem" controls></audio>
        <div>
            <button onclick="hearAudio()">Hear Player Audio</button>
            <button onclick="muteAudio()">Mute Player Audio</button>
        </div>
    </div>
    <div>
        <h2>Monitor</h2>
        <div>
            Peak Ch.1 Level: <span id="peak-db-ch1">-INF</span>dB,
            Peak Ch.2 Level: <span id="peak-db-ch2">-INF</span>dB,<br />
            Peak Ch.1 RMS: <span id="peak-rms-ch1">-INF</span>dB,
            Peak Ch.2 RMS: <span id="peak-rms-ch2">-INF</span>dB<br />
            <button id="peak-reset">Reset</button>
            <hr />
        </div>
        <div>
            <div class="ib">
                Level<br />
                Ch.1
            </div>
            <canvas id="ch1-peak" class="peak"></canvas>
            <div class="peak-val"><span id="ch1-peak-db">0</span>dB</div>
        </div>
        <div>
            <div class="ib">
                Level<br />
                Ch.2
            </div>
            <canvas id="ch2-peak" class="peak"></canvas>
            <div class="peak-val"><span id="ch2-peak-db">0</span>dB</div>
        </div>
        <hr />
        <div>
            <div class="ib">
                RMS<br />
                Ch.1
            </div>
            <canvas id="ch1-rms" class="peak"></canvas>
            <div class="peak-val"><span id="ch1-rms-db">0</span>dB</div>
        </div>
        <div>
            <div class="ib">
                RMS<br />
                Ch.2
            </div>
            <canvas id="ch2-rms" class="peak"></canvas>
            <div class="peak-val"><span id="ch2-rms-db">0</span>dB</div>
        </div>
        <hr />
        <div>
            <div class="ib">Ch.1</div>
            <canvas id="fft-ch1" class="osc"></canvas>
        </div>
        <div>
            <div class="ib">Ch.2</div>
            <canvas id="fft-ch2" class="osc"></canvas>
        </div>
        <hr />
        <div>
            <div class="ib">Ch.1</div>
            <canvas id="osc-ch1" class="osc"></canvas>
        </div>
        <div>
            <div class="ib">Ch.2</div>
            <canvas id="osc-ch2" class="osc"></canvas>
        </div>
    </div>
    <script>
        const inputFile = document.getElementById('input-file');
        const inputDisplayElem = document.getElementById('input-display');
        const audioElem = document.getElementById('audio-elem');

        const tgType = document.getElementById('tg-type');
        const tgFreq = document.getElementById('tg-freq');
        const tgDetune = document.getElementById('tg-detune');
        const tgStart = document.getElementById('tg-start');

        const maxDb1chElem = document.getElementById('peak-db-ch1');
        const maxDb2chElem = document.getElementById('peak-db-ch2');
        const maxRms1chElem = document.getElementById('peak-rms-ch1');
        const maxRms2chElem = document.getElementById('peak-rms-ch2');
        const maxReset = document.getElementById('peak-reset');

        const peakCanvas1chElem = document.getElementById('ch1-peak');
        const peakCanvas1chCtx = peakCanvas1chElem.getContext('2d');
        const peakCanvas2chElem = document.getElementById('ch2-peak');
        const peakCanvas2chCtx = peakCanvas2chElem.getContext('2d');

        const peakDb1chElem = document.getElementById('ch1-peak-db');
        const peakDb2chElem = document.getElementById('ch2-peak-db');

        const rmsCanvas1chElem = document.getElementById('ch1-rms');
        const rmsCanvas1chCtx = rmsCanvas1chElem.getContext('2d');
        const rmsCanvas2chElem = document.getElementById('ch2-rms');
        const rmsCanvas2chCtx = rmsCanvas2chElem.getContext('2d');

        const rmsDb1chElem = document.getElementById('ch1-rms-db');
        const rmsDb2chElem = document.getElementById('ch2-rms-db');

        const fft1chElem = document.getElementById('fft-ch1');
        const fft1chCtx = fft1chElem.getContext('2d');
        const fft2chElem = document.getElementById('fft-ch2');
        const fft2chCtx = fft2chElem.getContext('2d');

        const osc1chElem = document.getElementById('osc-ch1');
        const osc1chCtx = osc1chElem.getContext('2d');
        const osc2chElem = document.getElementById('osc-ch2');
        const osc2chCtx = osc2chElem.getContext('2d');

        const FFT_SIZE = 1024;
        const FREQ_FFT_SIZE = 4096;
        let sampleRate = 0;

        let audioCtx = null;
        let splitterNode = null;
        let analyzerLeft = null;
        let analyzerRight = null;
        let analyzerFull = null;
        let analyzerFreqLeft = null;
        let analyzerFreqRight = null;
        let audioSourceNode = null;
        let mediaElementSourceNode = null;
        let currentObjectUrl = null;
        let isAudioOutputConnected = false;
        let oscillator = null;

        function hearAudio() {
            if (!audioSourceNode || !audioCtx) return;
            if (isAudioOutputConnected) return;
            audioSourceNode.connect(audioCtx.destination);
            isAudioOutputConnected = true;
        }

        function muteAudio() {
            if (!audioSourceNode || !audioCtx) return;
            if (!isAudioOutputConnected) return;
            audioSourceNode.disconnect(audioCtx.destination);
            isAudioOutputConnected = false;
        }

        function connectAudioSource(sourceNode) {
            if (audioSourceNode !== null) {
                audioSourceNode.disconnect();
                isAudioOutputConnected = false;
            }

            audioSourceNode = sourceNode;
            audioSourceNode.connect(splitterNode);
            audioSourceNode.connect(analyzerFull);
            splitterNode.connect(analyzerLeft, 0);
            splitterNode.connect(analyzerRight, 1);
            splitterNode.connect(analyzerFreqLeft, 0);
            splitterNode.connect(analyzerFreqRight, 1);
        }

        function initAudioElementSource() {
            if (mediaElementSourceNode === null) {
                mediaElementSourceNode = audioCtx.createMediaElementSource(audioElem);
            }

            connectAudioSource(mediaElementSourceNode);

            sampleRate = audioCtx.sampleRate;
        }

        function initAudioStreamSource(stream) {
            connectAudioSource(audioCtx.createMediaStreamSource(stream));

            sampleRate = audioCtx.sampleRate;
        }

        function initAudioOscillatorSource() {
            const osc = audioCtx.createOscillator();
            oscillator = osc;

            connectAudioSource(osc);

            sampleRate = audioCtx.sampleRate;

            osc.start();
        }

        function changeOscillatorConfiguration() {
            if (oscillator === null || oscillator !== audioSourceNode) {
                initAudioOscillatorSource();
            }

            const type = tgType.value;
            const freq = parseFloat(tgFreq.value);
            const detune = parseFloat(tgDetune.value);

            oscillator.type = type;
            oscillator.frequency.value = freq;
            oscillator.detune.value = detune;
        }

        function initAudioEngine() {
            if (audioCtx !== null)
                destroyAudioEngine();

            audioCtx = new window.AudioContext();

            analyzerLeft = audioCtx.createAnalyser();
            analyzerRight = audioCtx.createAnalyser();
            analyzerFull = audioCtx.createAnalyser();

            analyzerFreqLeft = audioCtx.createAnalyser();
            analyzerFreqRight = audioCtx.createAnalyser();

            splitterNode = audioCtx.createChannelSplitter(2);

            analyzerLeft.fftSize = FFT_SIZE;
            analyzerLeft.smoothingTimeConstant = 0.3;
            analyzerRight.fftSize = FFT_SIZE;
            analyzerRight.smoothingTimeConstant = 0.3;
            analyzerFull.fftSize = FFT_SIZE;

            analyzerFreqLeft.fftSize = FREQ_FFT_SIZE;
            analyzerFreqRight.fftSize = FREQ_FFT_SIZE;

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        async function ensureAudioEngine() {
            if (audioCtx === null) {
                initAudioEngine();
            }

            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
        }

        function destroyAudioEngine() {
            if (audioSourceNode !== null) {
                audioSourceNode.disconnect();
                audioSourceNode = null;
            }
            if (mediaElementSourceNode !== null) {
                mediaElementSourceNode.disconnect();
                mediaElementSourceNode = null;
            }
            if (splitterNode !== null) {
                splitterNode.disconnect();
            }
            if (analyzerLeft !== null) {
                analyzerLeft.disconnect();
            }
            if (analyzerRight !== null) {
                analyzerRight.disconnect();
            }
            if (analyzerFull !== null) {
                analyzerFull.disconnect();
            }
            if (analyzerFreqLeft !== null) {
                analyzerFreqLeft.disconnect();
            }
            if (analyzerFreqRight !== null) {
                analyzerFreqRight.disconnect();
            }
            analyzerLeft = null;
            analyzerRight = null;
            splitterNode = null;
            analyzerFull = null;
            analyzerFreqLeft = null;
            analyzerFreqRight = null;
            audioCtx.close();
            audioCtx = null;
        }

        const dataLArray = new Float32Array(512);
        const dataRArray = new Float32Array(512);

        const dataFreqLArray = new Float32Array(FREQ_FFT_SIZE / 2);
        const dataFreqRArray = new Float32Array(FREQ_FFT_SIZE / 2);

        const MIN_DB_VALUE = -60;
        const DECAY_MULTIPLIER = 0.95;
        const PEAK_HOLD_DURATION = 1000;

        const RMS_DECAY = 0.85;

        async function sampleChannelLevel(analyzer, freqAnalyzer, dataArray, dataFreqArray, currentDb, lastPeakDb, lastPeakTime, currentRms) {
            analyzer.getFloatTimeDomainData(dataArray);
            freqAnalyzer.getFloatFrequencyData(dataFreqArray);

            let instantaneousPeak = 0;
            let sumSquares = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const val = dataArray[i];
                const absVal = Math.abs(val);
                if (absVal > instantaneousPeak) instantaneousPeak = absVal;
                sumSquares += val * val;
            }
            const rms = Math.sqrt(sumSquares / dataArray.length);

            let db = 20 * Math.log10(instantaneousPeak || 0.00001);
            if (db < MIN_DB_VALUE) db = MIN_DB_VALUE;

            let dbRms = 20 * Math.log10(rms || 0.00001);
            if (dbRms < MIN_DB_VALUE) dbRms = MIN_DB_VALUE;

            let ret = {
                newDb: 0, // Not have to initialize.
                newRms: 0,
                newPeakDb: lastPeakDb,
                newPeakTime: lastPeakTime,
            }

            if (db > currentDb) {
                ret.newDb = db;
            } else {
                // Decay
                ret.newDb = currentDb * DECAY_MULTIPLIER + db * (1 - DECAY_MULTIPLIER);
            }

            const currentTime = Date.now();

            if (db > lastPeakDb) {
                ret.newPeakDb = db;
                ret.newPeakTime = currentTime;
            } else if (currentTime - lastPeakTime > PEAK_HOLD_DURATION) {
                ret.newPeakDb = lastPeakDb - 0.6;
                if (ret.newPeakDb < MIN_DB_VALUE) ret.newPeakDb = MIN_DB_VALUE;
            }

            ret.newRms = currentRms * RMS_DECAY + dbRms * (1 - RMS_DECAY);

            return Promise.resolve(ret);
        }

        let dbLeft, dbRight,
            peakDbLeft, peakDbRight,
            lastPeakTimeLeft, lastPeakTimeRight,
            rmsLeft, rmsRight;

        dbLeft = MIN_DB_VALUE; dbRight = MIN_DB_VALUE;
        peakDbLeft = MIN_DB_VALUE; peakDbRight = MIN_DB_VALUE;
        lastPeakTimeLeft = 0; lastPeakTimeRight = 0;
        rmsLeft = MIN_DB_VALUE; rmsRight = MIN_DB_VALUE;

        let maxDb1ch, maxDb2ch, maxRms1ch, maxRms2ch;
        maxDb1ch = maxDb2ch = maxRms1ch = maxRms2ch = MIN_DB_VALUE;

        maxReset.addEventListener('click', function () {
            maxDb1ch = maxDb2ch = maxRms1ch = maxRms2ch = MIN_DB_VALUE;
        })

        let sampleUpdating = false;

        function sampleLevels() {
            if (!audioCtx || !analyzerLeft || !analyzerRight) return;

            if (sampleUpdating) return;
            sampleUpdating = true;

            Promise.all([
                sampleChannelLevel(
                    analyzerLeft,
                    analyzerFreqLeft,
                    dataLArray,
                    dataFreqLArray,
                    dbLeft,
                    peakDbLeft,
                    lastPeakTimeLeft,
                    rmsLeft
                ),
                sampleChannelLevel(
                    analyzerRight,
                    analyzerFreqRight,
                    dataRArray,
                    dataFreqRArray,
                    dbRight,
                    peakDbRight,
                    lastPeakTimeRight,
                    rmsRight
                ),
            ]).then(function(calcRes) {
                dbLeft = calcRes[0].newDb;
                peakDbLeft = calcRes[0].newPeakDb;
                lastPeakTimeLeft = calcRes[0].newPeakTime;
                rmsLeft = calcRes[0].newRms;

                dbRight = calcRes[1].newDb;
                peakDbRight = calcRes[1].newPeakDb;
                lastPeakTimeRight = calcRes[1].newPeakTime;
                rmsRight = calcRes[1].newRms;

                if (maxDb1ch < dbLeft) maxDb1ch = dbLeft
                if (maxDb2ch < dbRight) maxDb2ch = dbRight

                if (maxRms1ch < rmsLeft) maxRms1ch = rmsLeft
                if (maxRms2ch < rmsRight) maxRms2ch = rmsRight

                sampleUpdating = false;
            });
        }

        function dbToStr(db) {
            return db <= MIN_DB_VALUE ? '-INF' : db?.toFixed(2);
        }

        function animationFrame() {
            requestAnimationFrame(animationFrame);

            sampleLevels();

            // Peak info
            peakDb1chElem.textContent = dbToStr(peakDbLeft);
            peakDb2chElem.textContent = dbToStr(peakDbRight);

            // Peak level bar
            renderLevelBar(peakCanvas1chElem, peakCanvas1chCtx, dbLeft, peakDbLeft);
            renderLevelBar(peakCanvas2chElem, peakCanvas2chCtx, dbRight, peakDbRight);
            maxDb1chElem.textContent = dbToStr(maxDb1ch);
            maxDb2chElem.textContent = dbToStr(maxDb2ch);

            // RMS level bar
            renderRmsBar(rmsCanvas1chElem, rmsCanvas1chCtx, rmsLeft);
            renderRmsBar(rmsCanvas2chElem, rmsCanvas2chCtx, rmsRight);
            rmsDb1chElem.textContent = dbToStr(rmsLeft);
            rmsDb2chElem.textContent = dbToStr(rmsRight);

            maxRms1chElem.textContent = dbToStr(maxRms1ch);
            maxRms2chElem.textContent = dbToStr(maxRms2ch);

            renderOscilloscope(osc1chElem, osc1chCtx, dataLArray);
            renderOscilloscope(osc2chElem, osc2chCtx, dataRArray);

            renderFftLog(fft1chElem, fft1chCtx, dataFreqLArray);
            renderFftLog(fft2chElem, fft2chCtx, dataFreqRArray);
        }

        const LEVEL_BAR_MAX_DB = 0;
        const LEVEL_BAR_DB_SPAN = LEVEL_BAR_MAX_DB - MIN_DB_VALUE;

        function renderLevelBar(canvas, ctx, currentDb, peakDb) {
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            const dbFraction = Math.max(0, Math.min(1, (currentDb - MIN_DB_VALUE) / LEVEL_BAR_DB_SPAN));
            const currentWidth = dbFraction * width;

            const peakFraction = Math.max(0, Math.min(1, (peakDb - MIN_DB_VALUE) / LEVEL_BAR_DB_SPAN));
            const peakX = peakFraction * width;

            // Write simple bar
            ctx.fillStyle = 'rgb(0, 192, 0)';
            ctx.fillRect(0, 0, currentWidth, height);

            // Write labels
            writeDbAxis(canvas, ctx);

            // Write Peak
            ctx.fillStyle = 'rgb(255, 0, 0)';
            ctx.fillRect(peakX - 2, 0, 4, height);
        }

        function renderRmsBar(canvas, ctx, currentRms) {
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            const dbFraction = Math.max(0, Math.min(1, (currentRms - MIN_DB_VALUE) / LEVEL_BAR_DB_SPAN));
            const currentWidth = dbFraction * width;

            // Write simple bar
            ctx.fillStyle = 'rgb(0, 192, 0)';
            ctx.fillRect(0, 0, currentWidth, height);

            // Write labels
            writeDbAxis(canvas, ctx);
        }

        const OSC_ZOOM_Y = 100;

        function renderOscilloscope(canvas, ctx, dataArray) {
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = "rgb(0, 256, 0)";
            ctx.beginPath();

            const sliceWidth = width / dataArray.length;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] * OSC_ZOOM_Y;
                const y = height / 2 + v;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y)
                }
                x += sliceWidth;
            }

            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        function drawFreqLogAxis(ctx, width, height, sampleRate) {
            const nyquist = sampleRate / 2;
            const labels = [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000];

            labels.forEach(freq => {
                if (freq > nyquist) return;
                const normalized = Math.log(freq) / Math.log(nyquist);
                const x = normalized * width;
                ctx.fillText(freq + "Hz", x - 10, height - 5);
                ctx.beginPath();
                ctx.moveTo(x, height - 15);
                ctx.lineTo(x, height);
                ctx.stroke();
            });
        }

        function renderFftLog(canvas, ctx, dataFreqArray) {
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = "rgb(0, 255, 0)";
            ctx.fillStyle = "rgb(0, 255, 0)";

            // Draw axis first
            drawFreqLogAxis(ctx, width, height, sampleRate);

            ctx.beginPath();

            const n = dataFreqArray.length;
            const nyquist = sampleRate / 2;

            for (let i = 0; i < n; i++) {
                const v = Math.abs(dataFreqArray[i]);

                const frequency = i * (sampleRate / (n * 2));   // or analyser.fftSize
                let x = 0;

                if (frequency < 1) {
                    x = 0;
                } else {
                    x = (Math.log(frequency) / Math.log(nyquist)) * width;
                }

                // Y scaling - adjust multiplier based on your data
                const y = (v / 100 * height); // if not normalized

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.lineTo(width, height);
            ctx.stroke();
        }

        function waitForAudioReady() {
            if (audioElem.readyState >= HTMLMediaElement.HAVE_METADATA) {
                return Promise.resolve();
            }

            return new Promise(function(resolve, reject) {
                audioElem.addEventListener('loadedmetadata', resolve, { once: true });
                audioElem.addEventListener('error', reject, { once: true });
            });
        }

        async function loadAudioFile(file) {
            if (!file) return;

            try {
                await ensureAudioEngine();

                if (currentObjectUrl !== null) {
                    URL.revokeObjectURL(currentObjectUrl);
                }

                currentObjectUrl = URL.createObjectURL(file);
                audioElem.src = currentObjectUrl;
                audioElem.load();
                await waitForAudioReady();

                initAudioElementSource();
                hearAudio();
                await audioElem.play();
            }
            catch (err) {
                console.error('Failed to load audio file:', err);
                alert('Failed to load audio file. Try dropping it again.');
            }
        }

        inputFile.addEventListener('change', async function () {
            await loadAudioFile(inputFile.files[0]);
        });

        inputFile.addEventListener('dragover', function(e) {
            e.preventDefault();
        });

        inputFile.addEventListener('drop', async function(e) {
            e.preventDefault();

            if (e.dataTransfer.files.length > 0) {
                inputFile.files = e.dataTransfer.files;
                await loadAudioFile(e.dataTransfer.files[0]);
            }
        });

        inputDisplayElem.addEventListener('click', async function() {
            await ensureAudioEngine();

            const stream = await navigator.mediaDevices.getDisplayMedia(
                {
                    video: true,
                    audio: true,
                },
            );

            // Init
            initAudioStreamSource(stream);
            muteAudio();
        });

        async function tgOnChange() {
            await ensureAudioEngine();

            changeOscillatorConfiguration();
        }

        async function tgOnStart() {
            await tgOnChange();

            hearAudio();
        }

        tgType.addEventListener('input', tgOnChange);
        tgFreq.addEventListener('input', tgOnChange);
        tgDetune.addEventListener('input', tgOnChange);
        tgStart.addEventListener('click', tgOnStart);

        function writeDbAxis(canvas, ctx) {
            [-60, -50, -40, -30, -24, -20, -16, -12, -9, -6, -3].forEach(function(db) {
                const width = canvas.width;
                const height = canvas.height;

                const dbFraction = Math.max(0, Math.min(1, (db - MIN_DB_VALUE) / LEVEL_BAR_DB_SPAN));
                const dbX = dbFraction * width;

                ctx.fillStyle = 'rgb(96, 96, 255)';
                ctx.fillRect(dbX - 1, 0, 2, height);

                ctx.fillText(`${dbToStr(db)}`, dbX + 3, height - 14);
                ctx.fillText('dB', dbX + 3, height - 3);
            });
        }

        function resizeCanvas(canvas) {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }

        function onResize() {
            resizeCanvas(peakCanvas1chElem);
            resizeCanvas(peakCanvas2chElem);

            resizeCanvas(rmsCanvas1chElem);
            resizeCanvas(rmsCanvas2chElem);

            resizeCanvas(osc1chElem);
            resizeCanvas(osc2chElem);

            resizeCanvas(fft1chElem);
            resizeCanvas(fft2chElem);
        }

        window.addEventListener('resize', onResize);

        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Canvas size
            onResize();
            // kickoff first frame
            animationFrame();
        });
    </script>
</body>
</html>
