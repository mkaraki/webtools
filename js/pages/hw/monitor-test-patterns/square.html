<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Square</title>
    <link rel="stylesheet" href="/dist/hw/monitor-test-patterns-global.css" />
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'black';

            const squareSize = Math.floor(Math.min(canvas.width, canvas.height) * 0.9);
            const x = Math.floor((canvas.width - squareSize) / 2);
            const y = Math.floor((canvas.height - squareSize) / 2);

            ctx.fillRect(x, y, squareSize, squareSize);
            ctx.fillText(`Large Square x:${x} y:${y} size:${squareSize}x${squareSize} (90%)`, 5, 15);

            ctx.fillStyle = 'white';

            const squareSize2 = Math.floor(Math.min(canvas.width, canvas.height) * 0.3);
            const x2 = Math.floor((canvas.width - squareSize2) / 2);
            const y2 = Math.floor((canvas.height - squareSize2) / 2);

            ctx.fillRect(x2, y2, squareSize2, squareSize2);
            ctx.fillStyle = 'black';
            ctx.fillText(`Small Square x:${x2} y:${y2} size:${squareSize2}x${squareSize2} (30%)`, 5, 30);
        }

        setTimeout(draw, 0);
        window.addEventListener('resize', function () {
            setTimeout(draw, 0);
        });
    </script>
</body>
</html>
