<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clock with Tones</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        div#time {
            font-size: xxx-large;
            font-family: monospace;
            padding: 0.5em 1em;
            cursor: pointer;
        }
        div.detail {
            font-size: small;
            font-family: monospace;
            color: dimgray;
            margin-bottom: 1em;
        }
        div.detail > div {
            margin-top: 0.5em;
        }

        div#time.easy {
            background-color: black !important;
            color: #00FF00 !important;
        }

        .transparent {
            opacity: 0;
        }

        /*
         * Animated gradation
         *
         * Color Schema from Adobe Color: https://color.adobe.com/explore?q=Neutral+Palette&color-palette=CDD5C6%2CFBF2ED%2CCECED7%2CE8D4C6%2CCDEFFE&color-palette-name=My+Color+Theme
         */
        body.gradient {
            background: linear-gradient(-45deg,
                #CDEFFE,
                #CDD5C6,
                #FBF2ED,
                #CECED7,
                #E8D4C6,
                #CDEFFE,
                #E8D4C6,
                #CECED7,
                #FBF2ED,
                #CDD5C6,
                #CDEFFE
            );
            background-size: 600% 600%;
            animation: gradientShift 60s linear infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            100% {
                background-position: 0% 0%;
            }
        }
    </style>
</head>
<body>
    <div></div>
    <div id="time">
        Loading
        <noscript><br />Error: Requires JavaScript</noscript>
    </div>
    <div class="detail" id="detail-parent">
        <div id="utc-clock"></div>
        <div id="detail"></div>
        <div>
            <input type="checkbox" id="beep-toggle" />
            <label for="beep-toggle">Beep</label>

            <input type="checkbox" id="animated-background" />
            <label for="animated-background">Animated Background</label>

            <input type="checkbox" id="easy-clock-toggle" />
            <label for="easy-clock-toggle">Easy Clock</label>
        </div>
        <div>
            <a href="javascript:void(0)" id="hide-detail">
                Hide details view
            </a>
        </div>
    </div>
    <script>
        let lastClock = new Date();
        let now = new Date();

        let lastClockDiff = 0;

        const timeElem = document.getElementById('time');
        const utcClockElem = document.getElementById('utc-clock');
        const detailElem = document.getElementById('detail');

        const beepToggleElem = document.getElementById('beep-toggle');
        const animatedBackgroundToggleElem = document.getElementById('animated-background');
        const easyClockToggleElem = document.getElementById('easy-clock-toggle');

        const detailParentElem = document.getElementById('detail-parent');
        const hideDetailElem = document.getElementById('hide-detail');

        hideDetailElem.addEventListener('click', function () {
            detailParentElem.classList.toggle('transparent');
        });

        timeElem.addEventListener('click', function () {
            detailParentElem.classList.toggle('transparent');
        });

        let doBeep = false;

        function saveToLocalStorage() {
            localStorage.setItem('tone_clock_config', JSON.stringify({
                'beep': doBeep,
                'animateBg': animatedBackgroundToggleElem.checked,
                'easyClock': easyClockToggleElem.checked,
            }));
        }

        function loadFromLocalStorage() {
            const config = JSON.parse(localStorage.getItem('tone_clock_config'));
            if (config) {
                // To prevent not allowed start due to no gesture on the page, disable it.
                //beepToggleElem.checked = config.beep ?? false;
                //doBeep = config.beep ?? false;

                animatedBackgroundToggleElem.checked = config.animateBg ?? false;
                easyClockToggleElem.checked = config.easyClock ?? false;

                setAnimatedBackground();
                setEasyClock();
            }
        }

        beepToggleElem.addEventListener('change', function () {
            doBeep = beepToggleElem.checked;
            saveToLocalStorage();
        });

        function setAnimatedBackground() {
            document.body.classList.toggle('gradient', animatedBackgroundToggleElem.checked);
            saveToLocalStorage();
        }

        animatedBackgroundToggleElem.addEventListener('change', setAnimatedBackground);

        function setEasyClock() {
            timeElem.classList.toggle('easy', easyClockToggleElem.checked);
            saveToLocalStorage();
        }

        easyClockToggleElem.addEventListener('change', setEasyClock);

        let lastAnimClock = new Date();
        let lastAnimClockDiff = 0;

        const ctx = new AudioContext();

        function beep(freq, length) {
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);

            osc.frequency.value = freq;
            osc.start();
            osc.stop(ctx.currentTime + length);

            setTimeout(function() {
                osc.disconnect(ctx.destination);
            }, length * 1500)
        }

        function updateInternalClock() {
            now = new Date();
            try {
                lastClockDiff = now - lastClock;

                const now_sec = now.getSeconds();
                const last_sec = lastClock.getSeconds();

                if (doBeep && now_sec !== last_sec) {
                    const ones = now_sec % 10;
                    const tens = Math.floor(now_sec / 10);
                    if ((tens % 3 === 2) && ones >= 7) {
                        beep(440, 0.1);
                    } else if (ones === 0) {
                        beep(880, 0.8)
                    } else {
                        beep(1760, 0.05)
                    }
                }
            } finally {
                lastClock = new Date();
            }
        }

        function padNumber(n, length = 2) {
            return n.toString().padStart(length, '0');
        }

        function formatDateTimeToMsString(t) {
            const y = t.getFullYear();
            const mo = t.getMonth() + 1;
            const d = t.getDay();

            const h = t.getHours();
            const mi = t.getMinutes();
            const s = t.getSeconds();
            const ms = t.getMilliseconds();

            const h12 = h % 12;
            const am_or_pm = h < 12 ? 'AM' : 'PM';

            const ys = padNumber(y, 4);
            const mos = padNumber(mo, 2);
            const ds = padNumber(d, 2);

            const hs = padNumber(h12, 2);
            const mis = padNumber(mi, 2);
            const ss = padNumber(s, 2);
            const mss = padNumber(ms, 3)

            return `${ys}-${mos}-${ds} ${hs}:${mis}:${ss}.${mss} ${am_or_pm}`;
        }

        function convertDateToUtc(orig) {
            const offsetMin = orig.getTimezoneOffset();
            const offsetMs = offsetMin * 60_000;
            return new Date(orig.getTime() + offsetMs);
        }

        function animationFrame() {
            requestAnimationFrame(animationFrame);

            let animNow = new Date();
            lastAnimClockDiff = animNow - lastAnimClock;
            lastAnimClock = animNow;

            timeElem.textContent = formatDateTimeToMsString(now);
            utcClockElem.textContent = `${formatDateTimeToMsString(convertDateToUtc(now))} UTC`;
            detailElem.textContent = `Internal Clock: ${lastClockDiff} ms, Animation Frame: ${lastAnimClockDiff} ms, Timezone Offset: ${now.getTimezoneOffset()} min`;
        }

        // To match framerate.
        //const framerate = (screen?.refreshRate) ?? 60;
        //const expectedInternalClock = (1 / framerate) * 1000;

        setInterval(updateInternalClock, 1);
        animationFrame();
        loadFromLocalStorage();
    </script>
</body>
</html>
