<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elapsed Year/Month/Day Calculator</title>
    <style>
        .text-red {
            color: red;
        }
        form div {
            margin-bottom: 1em;
        }
    </style>
</head>

<body>
    <header>
        <h1>Elapsed Year/Month/Day Calculator</h1>
        <div id="current-date"></div>
        <hr />
    </header>

    <section>
        <h2>Input</h2>
        <form onsubmit="return false">
            <div>
                <label for="start-date-input">Start Date / Birthday</label><br>
                <input type="date" id="start-date-input" />
            </div>
            <div>
                <label for="end-date-input">End Date / As Of</label><br>
                <input type="date" id="end-date-input" />
                <button type="button" id="end-date-today">Today</button>
            </div>
            <div>
                <button type="button" id="start-calc">Calculate</button>
            </div>
        </form>
    </section>

    <section>
        <h2>Result</h2>
        <div class="text-red" id="error-message"></div>
        <dl>
            <dt>Elapsed Years / Months / Days</dt>
            <dd id="elapsed-ymd-output">-</dd>
            <dt>Elapsed Weeks</dt>
            <dd id="elapsed-weeks-output">-</dd>
        </dl>
    </section>

    <script>
        const startDateInput = document.getElementById('start-date-input');
        const endDateInput = document.getElementById('end-date-input');
        const endDateToday = document.getElementById('end-date-today');

        const startCalcButton = document.getElementById('start-calc');

        const elapsedYmdOutput = document.getElementById('elapsed-ymd-output');
        const elapsedWeeksOutput = document.getElementById('elapsed-weeks-output');

        function updateEndDateToToday() {
            endDateInput.value = Temporal.Now.plainDateISO();
        }
        endDateToday.addEventListener('click', updateEndDateToToday);

        startCalcButton.addEventListener('click', function () {
            elapsedYmdOutput.textContent = '';
            elapsedWeeksOutput.textContent = '';

            const startDateValue = startDateInput.value;
            const endDateValue = endDateInput.value;

            if (!startDateValue || !endDateValue) {
                alert('Please enter both start date and end date.');
                return;
            }

            const startDate = Temporal.PlainDate.from(startDateValue);
            const endDate = Temporal.PlainDate.from(endDateValue);

            if (Temporal.PlainDate.compare(endDate, startDate) < 0) {
                alert('End date must be after start date.');
                return;
            }

            const elapsed = endDate.since(startDate, { largestUnit: 'years' });
            const elapsedWeeks = endDate.since(startDate, { largestUnit: 'weeks' });

            elapsedYmdOutput.textContent = `${elapsed.years} years, ${elapsed.months} months, ${elapsed.days} days`;
            elapsedWeeksOutput.textContent = `${elapsedWeeks.weeks} weeks`;
        });

        updateEndDateToToday();
    </script>
</body>

</html>
