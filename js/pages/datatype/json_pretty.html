<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Prettier</title>
    <style>
        .text-red { color: red; }
        textarea {
            width: calc(100% - 15px);
            height: 30vh;
        }
    </style>
</head>

<body>
    <header>
        <h1>JSON Prettier</h1>
        <hr />
    </header>

    <main>
        <textarea id="json-str" placeholder="JSON here"></textarea><br />
        <button onclick="json_pretty()">Pretty</button>
        <button onclick="json_compress()">Compress</button>
        <hr />
        <textarea id="json-output" placeholder="Output JSON here" readonly></textarea>
        <p class="text-red" id="error-log"></p>
    </main>

    <script src="/dist/datatype/json_pretty.js"></script>
</body>

</html>
